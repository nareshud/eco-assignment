{{- if and .Values.configEnv (gt (len .Values.configEnv) 0) }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "eco-web.fullname" . }}-env
  labels:
    {{- include "eco-web.labels" . | nindent 4 }}
data:
{{- range $k, $v := .Values.configEnv }}
  {{ $k }}: {{ $v | quote }}
{{- end }}
{{- end }}
