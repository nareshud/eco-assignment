apiVersion: apps/v1
kind: Deployment

metadata:
  name: green-app
  namespace: production

spec:
  replicas: 2

  selector:
    matchLabels:
      app: demo
      version: green

  template:
    metadata:
      labels:
        app: demo
        version: green

    spec:
      containers:
      - name: green-app

        image: nginxdemos/hello:plain-text
        ports:
        - containerPort: 80

        readinessProbe:
          httpGet:
            path: /
            port: 80

          initialDelaySeconds: 5
          periodSeconds: 10